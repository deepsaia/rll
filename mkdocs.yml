site_name: RL Learning Course
site_description: Learn Reinforcement Learning with code examples
site_author: Deepak
repo_url: https://github.com/deepsaia/rll
repo_name: rll

theme:
  name: material
  features:
    - content.code.copy  # Copy button on code blocks
    - content.code.annotate  # Optional: inline annotations
    - content.action.edit  # Edit on GitHub
    - content.action.view  # View source on GitHub
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo

nav:
  - Home: index.md
  - Contents: contents.md
  - "Module 00": m00.md
  - "Module 01": m01.md

plugins:
  - search
  - git-revision-date-localized:  # Shows "Last updated"
      enable_creation_date: true
  - git-authors:  # Shows contributors

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences  # Required for advanced code blocks
  - pymdownx.arithmatex:  # LaTeX math support
      generic: true
  - pymdownx.tasklist:  # Checkbox-style task lists
      custom_checkbox: true
  - attr_list  # For custom CSS/classes
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js  # See below
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/progress.js

extra_css:
  - stylesheets/extra.css  # Optional: custom styles
